name: Publish OTA Metadata To GitHub Pages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish metadata from
        required: true
        type: string

concurrency:
  group: ota-pages-metadata
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release context
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"

          gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json tagName,url,body,publishedAt > /tmp/release.json

          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/release.json").read_text(encoding="utf-8"))
          with open(Path(__import__("os").environ["GITHUB_OUTPUT"]), "a", encoding="utf-8") as handle:
              handle.write(f"tag={payload['tagName']}\n")
              handle.write(f"url={payload['url']}\n")
              handle.write("published_at={}\n".format(payload.get("publishedAt", "")))
          with open("/tmp/release-body.md", "w", encoding="utf-8") as handle:
              handle.write(payload.get("body", ""))
          PY

      - name: Download release metadata assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p /tmp/release-assets
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "release-metadata.json" \
            --pattern "firmware.zip.sha256" \
            --dir /tmp/release-assets

      - name: Bootstrap current published metadata
        shell: bash
        run: |
          mkdir -p catalog/site
          SITE_BASE="https://${{ github.repository_owner }}.github.io/$(basename "${{ github.repository }}")"
          curl -fsSL "$SITE_BASE/catalog.json" -o catalog/site/catalog.json || true
          curl -fsSL "$SITE_BASE/releases.json" -o catalog/site/releases.json || true

      - name: Update catalog and release history
        env:
          RELEASE_URL: ${{ steps.release.outputs.url }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
          PUBLISHED_AT: ${{ steps.release.outputs.published_at }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          export RELEASE_BODY="$(cat /tmp/release-body.md)"
          python scripts/update_catalog.py \
            --site-dir catalog/site \
            --release-metadata /tmp/release-assets/release-metadata.json \
            --sha256-file /tmp/release-assets/firmware.zip.sha256

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: catalog/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
